<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriageAI — Dashboard</title>
    <meta name="description" content="Review AI-triaged Gmail messages. Filter by priority, department, and escalation. Click any card to open in Gmail.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/dashboard.css?v=__ASSET_VERSION__">
</head>
<body class="dashboard-body">

    <!-- Splash -->
    <div class="splash" id="splash-screen" aria-hidden="true">
        <div class="splash-inner">
            <div class="splash-logo">
                <svg width="52" height="52" viewBox="0 0 40 40" fill="none" aria-hidden="true">
                    <rect width="40" height="40" rx="12" fill="url(#ds)"/>
                    <path d="M10 14l10 8 10-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <rect x="10" y="14" width="20" height="14" rx="3" stroke="white" stroke-width="2.5" fill="none"/>
                    <defs>
                        <linearGradient id="ds" x1="0" y1="0" x2="40" y2="40">
                            <stop stop-color="#6366f1"/>
                            <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <p class="splash-name">TriageAI</p>
            <p class="splash-sub" id="splash-copy">Loading your workspace...</p>
            <div class="splash-bar-wrap"><span class="splash-bar"></span></div>
        </div>
    </div>

    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/" class="logo" aria-label="TriageAI home">
                <div class="logo-icon">
                    <svg width="36" height="36" viewBox="0 0 40 40" fill="none" aria-hidden="true">
                        <rect width="40" height="40" rx="12" fill="url(#tg)"/>
                        <path d="M10 14l10 8 10-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <rect x="10" y="14" width="20" height="14" rx="3" stroke="white" stroke-width="2.5" fill="none"/>
                        <defs>
                            <linearGradient id="tg" x1="0" y1="0" x2="40" y2="40">
                                <stop stop-color="#6366f1"/>
                                <stop offset="1" stop-color="#8b5cf6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">TriageAI</span>
            </a>

            <div class="topbar-actions">
                <div class="session-pill">
                    <span class="session-dot"></span>
                    <span>Secure session</span>
                </div>
                <div class="user-chip" id="user-email">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-5.5-2.5a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0zM10 12a5.99 5.99 0 00-4.793 2.39A6.483 6.483 0 0010 16.5a6.483 6.483 0 004.793-2.11A5.99 5.99 0 0010 12z" clip-rule="evenodd"/></svg>
                    Loading...
                </div>
                <form method="post" action="/auth/logout">
                    <button type="submit" class="logout-btn" aria-label="Sign out">
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M3 4.25A2.25 2.25 0 015.25 2h5.5A2.25 2.25 0 0113 4.25v2a.75.75 0 01-1.5 0v-2a.75.75 0 00-.75-.75h-5.5a.75.75 0 00-.75.75v11.5c0 .414.336.75.75.75h5.5a.75.75 0 00.75-.75v-2a.75.75 0 011.5 0v2A2.25 2.25 0 0110.75 18h-5.5A2.25 2.25 0 013 15.75V4.25z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M6 10a.75.75 0 01.75-.75h9.546l-1.048-.943a.75.75 0 111.004-1.114l2.5 2.25a.75.75 0 010 1.114l-2.5 2.25a.75.75 0 11-1.004-1.114l1.048-.943H6.75A.75.75 0 016 10z" clip-rule="evenodd"/></svg>
                        Sign out
                    </button>
                </form>
            </div>
        </div>
    </header>

    <div class="dash-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <p class="sidebar-label">Triage Controls</p>
                <button type="button" class="triage-btn" id="triage-btn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H3.989a.75.75 0 00-.75.75v4.242a.75.75 0 001.5 0v-2.43l.31.31a7 7 0 0011.712-3.138.75.75 0 00-1.449-.39zm1.23-3.723a.75.75 0 00.219-.53V2.929a.75.75 0 00-1.5 0V5.36l-.31-.31A7 7 0 003.239 8.188a.75.75 0 101.448.389A5.5 5.5 0 0113.89 6.11l.311.31h-2.432a.75.75 0 000 1.5h4.243a.75.75 0 00.53-.219z" clip-rule="evenodd"/></svg>
                    Start Triage
                </button>
                <button type="button" class="stop-btn is-hidden" id="stop-btn">
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M5.75 3a.75.75 0 00-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 00.75-.75V3.75A.75.75 0 007.25 3h-1.5zM12.75 3a.75.75 0 00-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 00.75-.75V3.75a.75.75 0 00-.75-.75h-1.5z"/></svg>
                    Stop after batch
                </button>
                <button type="button" class="load-more-btn is-hidden" id="load-more-btn">Load 100 more</button>
                <div class="fetch-status-row">
                    <span class="fetch-status" id="fetch-status">Ready to start</span>
                </div>
                <div class="progress-wrap">
                    <div class="progress-track">
                        <span class="progress-fill" id="loading-bar" style="width:0%"></span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <p class="sidebar-label">Stats</p>
                <div class="stat-row"><span class="stat-key">Triaged</span><strong class="stat-val" id="stat-total">0</strong></div>
                <div class="stat-row"><span class="stat-key">Avg confidence</span><strong class="stat-val" id="stat-avg">0%</strong></div>
                <div class="stat-row"><span class="stat-key">High priority</span><strong class="stat-val stat-danger" id="stat-high">0</strong></div>
                <div class="stat-row"><span class="stat-key">Escalations</span><strong class="stat-val stat-escalate" id="stat-escalations">0</strong></div>
                <div class="stat-row"><span class="stat-key">Top topic</span><strong class="stat-val stat-topic" id="stat-top-cat">—</strong></div>
            </div>

            <div class="sidebar-section">
                <p class="sidebar-label">Department Mix</p>
                <div class="dept-list" id="department-list">
                    <p class="sidebar-empty">Run triage to see distribution</p>
                </div>
            </div>

            <div class="sidebar-section">
                <p class="sidebar-label">Escalations &amp; Urgent</p>
                <div class="watch-list" id="watch-list">
                    <p class="sidebar-empty">High-priority cards appear here</p>
                </div>
            </div>
        </aside>

        <!-- Main Queue -->
        <main class="queue-main" aria-live="polite">
            <div class="queue-header">
                <div class="queue-title-row">
                    <h1 class="queue-title">Email Queue</h1>
                    <label class="sort-label" for="sort-select">
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M2.628 1.601C5.028 1.206 7.49 1 10 1s4.973.206 7.372.601a.75.75 0 01.628.74v2.288a2.25 2.25 0 01-.659 1.59l-4.682 4.683a2.25 2.25 0 00-.659 1.59v3.037c0 .684-.31 1.33-.844 1.757l-1.937 1.55A.75.75 0 018 18.25v-5.757a2.25 2.25 0 00-.659-1.591L2.659 6.22A2.25 2.25 0 012 4.629V2.34a.75.75 0 01.628-.74z" clip-rule="evenodd"/></svg>
                        <select id="sort-select" aria-label="Sort emails">
                            <option value="newest">Newest first</option>
                            <option value="priority">Highest priority</option>
                            <option value="confidence">Highest confidence</option>
                        </select>
                    </label>
                </div>
                <div class="filter-bar" id="filter-row" aria-label="Queue filters" role="toolbar"></div>
            </div>
            <div class="email-list" id="email-list"></div>
        </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="/static/dashboard.js?v=__ASSET_VERSION__" defer></script>
</body>
</html>
