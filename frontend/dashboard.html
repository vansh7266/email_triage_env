<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — TriageAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A73E8;
            --text-main: #202124;
            --text-muted: #5F6368;
            --bg: #F8F9FA;
            --white: #FFFFFF;
            --border: #DADCE0;
            --green: #1E8E3E;
            --red: #C5221F;
            --orange: #E37400;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* TOPBAR */
        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-mark svg {
            width: 18px;
            height: 18px;
        }

        .logo-name {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-badge {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .btn-triage {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s var(--ease);
            font-family: 'Inter', sans-serif;
        }

        .btn-triage:hover {
            background: #1557B0;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.3);
        }

        .btn-triage:disabled {
            background: #BDC1C6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* MAIN LAYOUT */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* STATS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-card .sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* CONTENT AREA */
        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .content-title {
            font-size: 18px;
            font-weight: 600;
        }

        .filter-row {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #E8F0FE;
            border-color: var(--primary);
            color: var(--primary);
        }

        /* EMAIL CARDS */
        .email-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .email-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: start;
            transition: box-shadow 0.2s, transform 0.2s;
            animation: slideIn 0.4s var(--ease) both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .email-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
            transform: translateY(-2px);
        }

        .email-card.escalate {
            border-left: 4px solid var(--red);
        }

        .email-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .email-sender {
            font-size: 13px;
            color: var(--text-muted);
        }

        .email-subject {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .email-body {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .email-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
        }

        .tag-billing {
            background: #E8F0FE;
            color: #1A73E8;
        }

        .tag-technical {
            background: #FEF3E2;
            color: #E37400;
        }

        .tag-complaint {
            background: #FCE8E6;
            color: #C5221F;
        }

        .tag-general {
            background: #E6F4EA;
            color: #1E8E3E;
        }

        .tag-spam {
            background: #F1F3F4;
            color: #5F6368;
        }

        .tag-high {
            background: #FCE8E6;
            color: #C5221F;
        }

        .tag-medium {
            background: #FEF3E2;
            color: #E37400;
        }

        .tag-low {
            background: #E6F4EA;
            color: #1E8E3E;
        }

        .tag-escalate {
            background: #FCE8E6;
            color: #C5221F;
            font-weight: 700;
        }

        .tag-dept {
            background: #F3E8FD;
            color: #7B1FA2;
        }

        .email-score-col {
            text-align: right;
            min-width: 80px;
        }

        .score-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            margin-left: auto;
            margin-bottom: 6px;
            border: 3px solid var(--border);
        }

        .score-high {
            border-color: var(--green);
            color: var(--green);
        }

        .score-mid {
            border-color: var(--orange);
            color: var(--orange);
        }

        .score-low {
            border-color: var(--red);
            color: var(--red);
        }

        .score-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* LOADING */
        .loading-bar {
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
            width: 0;
            transition: width 0.3s ease;
            margin-bottom: 24px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #202124;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s var(--ease);
            z-index: 100;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .topbar {
                padding: 0 16px;
            }

            .main {
                padding: 20px 16px;
            }
        }
    </style>
</head>

<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="logo-mark">
                <svg viewBox="0 0 32 32" fill="none">
                    <path d="M6 10l10 7 10-7" stroke="white" stroke-width="2" stroke-linecap="round" />
                    <rect x="6" y="10" width="20" height="14" rx="2" stroke="white" stroke-width="2" fill="none" />
                </svg>
            </div>
            <span class="logo-name">TriageAI</span>
        </div>
        <div class="topbar-right">
            <span class="user-badge" id="user-email">Loading...</span>
            <button class="btn-triage" id="triage-btn" onclick="runTriage()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                    <polyline points="22,6 12,13 2,6" />
                </svg>
                Triage Inbox
            </button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="loading-bar" id="loading-bar"></div>

        <!-- STATS -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="label">Emails Triaged</div>
                <div class="value" id="stat-total">0</div>
                <div class="sub">from your inbox</div>
            </div>
            <div class="stat-card">
                <div class="label">Avg Score</div>
                <div class="value" id="stat-avg">—</div>
                <div class="sub">accuracy</div>
            </div>
            <div class="stat-card">
                <div class="label">Escalations</div>
                <div class="value" id="stat-escalations" style="color:#C5221F">0</div>
                <div class="sub">need attention</div>
            </div>
            <div class="stat-card">
                <div class="label">Top Category</div>
                <div class="value" id="stat-top-cat" style="font-size:16px;padding-top:6px">—</div>
                <div class="sub">most common</div>
            </div>
        </div>

        <!-- EMAIL LIST -->
        <div class="content-header">
            <div class="content-title">Triaged Emails</div>
            <div class="filter-row">
                <button class="filter-btn active" onclick="filterEmails('all', this)">All</button>
                <button class="filter-btn" onclick="filterEmails('escalate', this)">🚨 Escalate</button>
                <button class="filter-btn" onclick="filterEmails('billing', this)">💳 Billing</button>
                <button class="filter-btn" onclick="filterEmails('technical_support', this)">🔧 Technical</button>
                <button class="filter-btn" onclick="filterEmails('complaint', this)">😠 Complaints</button>
            </div>
        </div>

        <div class="email-list" id="email-list">
            <div class="empty-state">
                <div class="empty-icon">📬</div>
                <div class="empty-title">No emails triaged yet</div>
                <div class="empty-sub">Click "Triage Inbox" to fetch and analyse your latest emails.</div>
                <button class="btn-triage" onclick="runTriage()">Start Triaging</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        let allEmails = [];
        let currentFilter = 'all';

        async function runTriage() {
            const btn = document.getElementById('triage-btn');
            const bar = document.getElementById('loading-bar');
            btn.disabled = true;
            btn.textContent = 'Triaging...';
            bar.style.width = '30%';

            try {
                bar.style.width = '60%';
                const res = await fetch('/triage', { method: 'POST' });
                bar.style.width = '90%';

                if (!res.ok) {
                    const err = await res.json();
                    showToast('Error: ' + (err.detail || 'Something went wrong'));
                    return;
                }

                const data = await res.json();
                allEmails = data.results;
                bar.style.width = '100%';
                setTimeout(() => { bar.style.width = '0'; }, 500);

                updateStats(data);
                renderEmails(allEmails);
                showToast(`✅ Triaged ${allEmails.length} emails successfully!`);
            } catch (e) {
                showToast('Network error. Is the server running?');
                bar.style.width = '0';
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Triage Inbox`;
            }
        }

        function updateStats(data) {
            document.getElementById('stat-total').textContent = data.results.length;
            const avg = data.results.reduce((s, e) => s + e.score, 0) / data.results.length;
            document.getElementById('stat-avg').textContent = avg.toFixed(2);
            const escalations = data.results.filter(e => e.escalate).length;
            document.getElementById('stat-escalations').textContent = escalations;
            const cats = {};
            data.results.forEach(e => { cats[e.category] = (cats[e.category] || 0) + 1; });
            const top = Object.entries(cats).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('stat-top-cat').textContent = top ? top[0].replace('_', ' ') : '—';
        }

        function filterEmails(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = filter === 'all' ? allEmails
                : filter === 'escalate' ? allEmails.filter(e => e.escalate)
                    : allEmails.filter(e => e.category === filter);
            renderEmails(filtered);
        }

        function renderEmails(emails) {
            const list = document.getElementById('email-list');
            if (!emails.length) {
                list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No emails match this filter</div></div>`;
                return;
            }
            list.innerHTML = emails.map((e, i) => `
    <div class="email-card ${e.escalate ? 'escalate' : ''}" style="animation-delay:${i * 60}ms">
      <div class="email-left">
        <div class="email-meta">
          <span class="email-sender">${escHtml(e.sender)}</span>
          ${e.escalate ? '<span class="tag tag-escalate">🚨 ESCALATE</span>' : ''}
        </div>
        <div class="email-subject">${escHtml(e.subject)}</div>
        <div class="email-body">${escHtml(e.body)}</div>
        <div class="email-tags">
          <span class="tag tag-${e.category.replace('_', '-')}">${catLabel(e.category)}</span>
          <span class="tag tag-${e.priority}">${e.priority.toUpperCase()}</span>
          <span class="tag tag-dept">🏢 ${e.department.replace('_', ' ')}</span>
        </div>
      </div>
      <div class="email-score-col">
        <div class="score-circle ${scoreClass(e.score)}">${(e.score * 100).toFixed(0)}%</div>
        <div class="score-label">confidence</div>
      </div>
    </div>
  `).join('');
        }

        function catLabel(cat) {
            const m = { billing: '💳 Billing', technical_support: '🔧 Technical', complaint: '😠 Complaint', general_inquiry: '💬 General', spam: '🚫 Spam' };
            return m[cat] || cat;
        }
        function scoreClass(s) {
            return s >= 0.7 ? 'score-high' : s >= 0.4 ? 'score-mid' : 'score-low';
        }
        function escHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        // Load user info
        fetch('/auth/me').then(r => r.json()).then(d => {
            document.getElementById('user-email').textContent = d.email || 'Connected';
        }).catch(() => {
            document.getElementById('user-email').textContent = 'Connected';
        });
    </script>
</body>

</html>
